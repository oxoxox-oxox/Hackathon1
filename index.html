<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VR Vocabulary Learning</title>
    <meta name="description" content="VR-assisted vocabulary learning website">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: #000;
            color: #fff;
            overflow: hidden;
        }

        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.5s ease;
        }

        .loading-content {
            text-align: center;
        }

        .loading-spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            font-size: 24px;
            margin-bottom: 10px;
        }

        .loading-subtext {
            font-size: 16px;
            opacity: 0.8;
        }

        #vr-button {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 40px;
            font-size: 18px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            z-index: 100;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            transition: all 0.3s ease;
        }

        #vr-button:hover {
            transform: translateX(-50%) scale(1.05);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        #vr-button:disabled {
            background: #666;
            cursor: not-allowed;
            transform: translateX(-50%) scale(1);
        }

        #info-panel {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.8);
            padding: 20px;
            border-radius: 10px;
            max-width: 300px;
            z-index: 50;
            display: none;
        }

        #info-panel h2 {
            color: #667eea;
            margin-bottom: 10px;
        }

        #info-panel p {
            margin: 5px 0;
            line-height: 1.4;
        }

        .hidden {
            display: none !important;
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
        }

        #debug-panel {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.8);
            padding: 10px;
            border-radius: 5px;
            max-width: 250px;
            z-index: 100;
            font-size: 12px;
            display: none;
        }

        #debug-info {
            color: #00ff00;
            font-family: monospace;
            line-height: 1.4;
        }
    </style>
</head>
<body>
    <div id="loading-screen">
        <div class="loading-content">
            <div class="loading-spinner"></div>
            <div class="loading-text">正在加载 VR 词汇学习...</div>
            <div class="loading-subtext">请稍候，我们正在准备3D环境</div>
        </div>
    </div>

    <button id="vr-button">进入 VR</button>

    <div id="info-panel">
        <h2 id="word-title">Word</h2>
        <p id="word-meaning">Meaning</p>
        <p id="word-scene">Scene</p>
    </div>

    <div id="debug-panel">
        <div id="debug-info">Debug Info</div>
    </div>

    <div id="canvas-container"></div>

    <script type="module" src="/src/main.js"></script>
</body>
</html>
